  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
  h1 { text-align: center; color: #fff; margin-bottom: 0.4rem; font-size: 1.8rem; }
  .subtitle { text-align: center; color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
  .lang-group { margin-bottom: 1.5rem; }
  .lang-title { font-size: 1rem; font-weight: 600; padding: 0.5rem 0.8rem; background: #1a1a30; color: #a8c7fa; border-radius: 8px; margin-bottom: 0.5rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
  .lang-title:hover { background: #242048; }
  .lang-title::after { content: '▼'; font-size: 0.65rem; transition: transform 0.2s; }
  .lang-group.collapsed .lang-title::after { transform: rotate(-90deg); }
  .lang-group.collapsed .voices { display: none; }
  .voices { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 0.4rem; padding: 0.25rem; }
  .voice-item { background: #16162a; border: 1px solid #252545; border-radius: 6px; padding: 0.5rem 0.7rem; font-size: 0.82rem; display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
  .voice-item:hover { border-color: #4a6ab8; background: #1c1c38; }
  .voice-name { flex: 1; word-break: break-all; color: #d0d0e8; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.78rem; }
  .copy-btn { background: #2a4080; border: none; border-radius: 4px; color: #c8d8f8; padding: 0.25rem 0.7rem; cursor: pointer; font-size: 0.78rem; white-space: nowrap; flex-shrink: 0; }
  .copy-btn:hover { background: #3a5aa0; }
  .copy-btn.copied { background: #1a4a2a; color: #8dc88a; }
  .search-wrap { max-width: 560px; margin: 0 auto 2rem; display: flex; gap: 0.5rem; }
  #search { flex: 1; padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid #2a2a4a; background: #1a1a2e; color: #e0e0e0; font-size: 0.9rem; outline: none; }
  #search:focus { border-color: #3b5bdb; }
  .lang-count { font-size: 0.78rem; color: #6680aa; background: #1e2040; padding: 0.1rem 0.5rem; border-radius: 10px; }

const langMap = {};
voices.forEach(v => {
  let lang;
  if (v.startsWith('Chinese (Mandarin)')) lang = 'Chinese (Mandarin)';
  else if (v.startsWith('Cantonese')) lang = 'Cantonese';
  else if (v.startsWith('English')) lang = 'English';
  else if (v.startsWith('Japanese')) lang = 'Japanese';
  else if (v.startsWith('Dutch')) lang = 'Dutch';
  else if (v.startsWith('Vietnamese')) lang = 'Vietnamese';
  else if (v.startsWith('Korean')) lang = 'Korean';
  else if (v.startsWith('Spanish')) lang = 'Spanish';
  else if (v.startsWith('Portuguese')) lang = 'Portuguese';
  else if (v.startsWith('French')) lang = 'French';
  else if (v.startsWith('Indonesian')) lang = 'Indonesian';
  else if (v.startsWith('German')) lang = 'German';
  else if (v.startsWith('Russian')) lang = 'Russian';
  else if (v.startsWith('Italian')) lang = 'Italian';
  else if (v.startsWith('Arabic')) lang = 'Arabic';
  else if (v.startsWith('Turkish')) lang = 'Turkish';
  else if (v.startsWith('Ukrainian')) lang = 'Ukrainian';
  else lang = 'Other';
  if (!langMap[lang]) langMap[lang] = [];
  langMap[lang].push(v);
});

function buildUI(filter) {
  listEl.innerHTML = '';
  let total = 0;
  const sortedLangs = Object.keys(langMap).sort();
  for (const lang of sortedLangs) {
    const filtered = langMap[lang].filter(v => v.toLowerCase().includes(filter.toLowerCase()));
    if (filtered.length === 0) continue;
    total += filtered.length;
    const group = document.createElement('div');
    group.className = 'lang-group';
    group.innerHTML = `<div class="lang-title"><span>${lang}</span><span class="lang-count">${filtered.length}</span></div>`;
    group.querySelector('.lang-title').addEventListener('click', () => group.classList.toggle('collapsed'));
    const grid = document.createElement('div');
    grid.className = 'voices';
    filtered.forEach(name => {
      const item = document.createElement('div');
      item.className = 'voice-item';
      item.innerHTML = `<span class="voice-name">${name}</span><button class="copy-btn" data-voice="${name}">复制命令</button>`;
      grid.appendChild(item);
    });
    group.appendChild(grid);
    listEl.appendChild(group);
  }
  document.getElementById('total').textContent = total;
}

const listEl = document.getElementById('list');

document.addEventListener('click', e => {
  if (e.target.classList.contains('copy-btn')) {
    const btn = e.target;
    const voice = btn.dataset.voice;
    const cmd = `mmx speech synthesize --text "Test" --voice "${voice}" --format mp3 --out test.mp3`;
    navigator.clipboard.writeText(cmd).then(() => {
      btn.textContent = '已复制!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '复制命令';
        btn.classList.remove('copied');
      }, 1500);
    });
  }
});

searchInput.addEventListener('input', () => buildUI(searchInput.value));

buildUI('');
